<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 בוט הבנת הנקרא | כיתות ד-ו</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(135deg, #fff9f0 0%, #fef3ff 50%, #f0f8ff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeDown 0.6s ease;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #6c3fc5;
    text-shadow: 0 2px 12px rgba(108,63,197,0.15);
  }

  header p {
    color: #9b6dd6;
    font-size: 1rem;
    margin-top: 6px;
  }

  #chat-container {
    background: #ffffff;
    border: 2px solid #e8d5ff;
    border-radius: 24px;
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    height: 72vh;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(108,63,197,0.12);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
    background: #fdfaff;
  }

  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: #f5eeff; border-radius: 10px; }
  #messages::-webkit-scrollbar-thumb { background: #c9a6f5; border-radius: 10px; }

  .msg {
    max-width: 78%;
    padding: 13px 17px;
    border-radius: 18px;
    font-size: 1.05rem;
    line-height: 1.65;
    animation: popIn 0.3s ease;
    white-space: pre-wrap;
  }

  .msg.bot {
    background: linear-gradient(135deg, #f0e6ff, #e8d5ff);
    color: #3d1f7a;
    align-self: flex-start;
    border-bottom-right-radius: 4px;
    border: 1.5px solid #d4b0ff;
  }

  .msg.user {
    background: linear-gradient(135deg, #ff7eb3, #ff5c94);
    color: #fff;
    align-self: flex-end;
    border-bottom-left-radius: 4px;
    box-shadow: 0 4px 12px rgba(255,92,148,0.3);
  }

  .msg.thinking {
    background: #fff3e8;
    color: #d4815a;
    align-self: flex-start;
    font-style: italic;
    border: 1px dashed #ffb891;
    animation: pulse 1.2s infinite;
  }

  #input-area {
    display: flex;
    gap: 10px;
    padding: 16px;
    border-top: 2px solid #f0e6ff;
    background: #fff;
  }

  #user-input {
    flex: 1;
    background: #faf5ff;
    border: 2px solid #d4b0ff;
    color: #3d1f7a;
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border 0.3s;
    direction: rtl;
  }

  #user-input::placeholder { color: #b89fd4; }
  #user-input:focus { border-color: #9b6dd6; background: #fff; }

  #send-btn {
    background: linear-gradient(135deg, #9b6dd6, #6c3fc5);
    border: none;
    border-radius: 14px;
    padding: 12px 22px;
    color: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(108,63,197,0.3);
  }

  #send-btn:hover { transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .quick-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px 16px 4px;
    background: #fff;
    border-bottom: 2px solid #f0e6ff;
  }

  .quick-btn {
    background: linear-gradient(135deg, #fff0fa, #f5e6ff);
    border: 1.5px solid #e0b8ff;
    color: #7a3cbf;
    border-radius: 20px;
    padding: 7px 15px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-btn:hover {
    background: linear-gradient(135deg, #e8d5ff, #d4b0ff);
    color: #4a1fa0;
    transform: translateY(-1px);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  @media (max-width: 480px) {
    header h1 { font-size: 1.4rem; }
    #chat-container { height: 80vh; }
  }
</style>
</head>
<body>

<header>
  <h1 id="main-title">📖 בוט שפה חכם</h1>
  <p>לכיתות ד–ו | שאל, תרגל, למד!</p>
</header>

<div id="topic-tabs">
  <button class="tab-btn active" data-topic="havanah" onclick="switchTopic('havanah')">📖 הבנת הנקרא</button>
  <button class="tab-btn" data-topic="dikduk" onclick="switchTopic('dikduk')">🔤 דקדוק לשוני</button>
  <button class="tab-btn" data-topic="poalim" onclick="switchTopic('poalim')">⚡ פעלים</button>
</div>

<div id="chat-container">
  <div class="quick-btns" id="quick-btns"></div>

  <div id="messages">
    <div class="msg bot" id="welcome-msg"></div>
  </div>

  <div id="input-area">
    <input type="text" id="user-input" placeholder="כתוב שאלה או בקש תרגיל..." />
    <button id="send-btn" onclick="sendMessage()">שלח ▶</button>
  </div>
</div>

<script>
const TOPICS = {
  havanah: {
    title: '📖 בוט הבנת הנקרא',
    welcome: 'שלום! 📖✨ אני הבוט של הבנת הנקרא!\nאני יכול לתת לך קטעי קריאה עם שאלות, להסביר מושגים, ולעזור לך להבין טקסטים.\nעל מה תרצה לעבוד היום? 😊',
    buttons: [
      { label: 'קטע + שאלות', msg: 'תן לי קטע קריאה קצר עם שאלות' },
      { label: 'רעיון מרכזי', msg: 'מה זה רעיון מרכזי?' },
      { label: 'הסקה', msg: 'תן לי שאלת הסקה' },
      { label: 'כוונת הכותב', msg: 'הסבר מה זה כוונת הכותב' },
      { label: 'חידון!', msg: 'תן לי חידון הבנת הנקרא' },
    ],
    system: `אתה בוט לימודי להבנת הנקרא לתלמידי כיתות ד–ו בישראל.
תפקידך:
- לתת קטעי קריאה קצרים ומעניינים (5-8 משפטים) ואחריהם 3-4 שאלות הבנה
- להסביר מושגים: רעיון מרכזי, פרטים תומכים, הסקה, מסקנה, כותרת מתאימה
- לבדוק תשובות של התלמיד ולהסביר בסבלנות
- לעודד ולחזק את התלמיד
- לכתוב תמיד בעברית, בסגנון חם וחיובי לגיל 9-12
- תשובות קצרות עד בינוניות — לא יותר מ-12 שורות
אל תענה על שאלות שאינן קשורות להבנת הנקרא ולשפה.`
  },
  dikduk: {
    title: '🔤 בוט דקדוק לשוני',
    welcome: 'שלום! 🔤✨ אני הבוט של הדקדוק הלשוני!\nאני יכול להסביר חלקי דיבר, מבנה משפט, שורשים, ולתת תרגילים.\nעל מה תרצה לעבוד היום? 😊',
    buttons: [
      { label: 'שם עצם', msg: 'הסבר מה זה שם עצם ותן דוגמאות' },
      { label: 'שם תואר', msg: 'הסבר מה זה שם תואר ותן דוגמאות' },
      { label: 'מילת יחס', msg: 'מה זה מילת יחס? תן דוגמאות' },
      { label: 'שורש', msg: 'הסבר מה זה שורש ואיך מוצאים אותו' },
      { label: 'חידון דקדוק!', msg: 'תן לי חידון על חלקי דיבר' },
    ],
    system: `אתה בוט לימודי לדקדוק לשוני לתלמידי כיתות ד–ו בישראל.
תפקידך:
- להסביר חלקי דיבר: שם עצם, שם תואר, פועל, מילת יחס, כינוי גוף, מילת חיבור
- להסביר מבנה משפט: נושא, נשוא, מושא
- להסביר שורש, משקל, תחיליות וסיומות
- לתת תרגילים ולבדוק תשובות
- לכתוב בעברית ברורה, חמה וחיובית לגיל 9-12
- תשובות קצרות עד בינוניות — לא יותר מ-10 שורות
אל תענה על שאלות שאינן קשורות לדקדוק ולשפה העברית.`
  },
  poalim: {
    title: '⚡ בוט פעלים',
    welcome: 'שלום! ⚡✨ אני הבוט של הפעלים!\nאני יכול להסביר בניינים, גזרות, זמנים ולתת תרגילים על הטיית פעלים.\nעל מה תרצה לעבוד היום? 😊',
    buttons: [
      { label: 'פעל', msg: 'הסבר את בניין פעל ותן דוגמה' },
      { label: 'פיעל', msg: 'הסבר את בניין פיעל ותן דוגמה' },
      { label: 'הפעיל', msg: 'הסבר את בניין הפעיל ותן דוגמה' },
      { label: 'גזרת שלמים', msg: 'הסבר מה זה גזרת שלמים' },
      { label: 'תרגיל הטיה!', msg: 'תן לי תרגיל על הטיית פועל בכל הזמנים' },
    ],
    system: `אתה בוט לימודי לנושא פעלים לתלמידי כיתות ד–ו בישראל.
תפקידך:
- להסביר בניינים: פעל, נפעל, פיעל, פועל, התפעל, הפעיל, הופעל
- להסביר גזרות: שלמים, חסרי א, חסרי ו/י, כפולים, למ"ד ה
- להסביר זמנים: עבר, הווה, עתיד, ציווי
- לתת תרגילי הטיה ולבדוק תשובות
- להסביר הבדל בין בניינים בדוגמאות מוחשיות
- לכתוב בעברית ברורה, חמה וחיובית לגיל 9-12
- תשובות קצרות עד בינוניות — לא יותר מ-10 שורות
אל תענה על שאלות שאינן קשורות לפעלים ולשפה העברית.`
  }
};

let currentTopic = 'havanah';
let history = [];

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

function switchTopic(topic) {
  currentTopic = topic;
  history = [];
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-topic="${topic}"]`).classList.add('active');

  const t = TOPICS[topic];
  document.getElementById('main-title').textContent = t.title;

  // update quick buttons
  const btnsEl = document.getElementById('quick-btns');
  btnsEl.innerHTML = '';
  t.buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = b.label;
    btn.onclick = () => sendQuick(b.msg);
    btnsEl.appendChild(btn);
  });

  // clear messages + new welcome
  messagesEl.innerHTML = '';
  const welcome = document.createElement('div');
  welcome.className = 'msg bot';
  welcome.textContent = t.welcome;
  messagesEl.appendChild(welcome);
}

// init
switchTopic('havanah');

function sendQuick(text) {
  inputEl.value = text;
  sendMessage();
}

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  sendBtn.disabled = true;

  addMsg(text, 'user');
  history.push({ role: 'user', content: text });

  const thinkingEl = addMsg('חושב...✨', 'thinking');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: TOPICS[currentTopic].system,
        messages: history
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'אופס, משהו השתבש. נסה שוב!';

    thinkingEl.remove();
    addMsg(reply, 'bot');
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    thinkingEl.remove();
    addMsg('שגיאה בחיבור. בדוק אינטרנט ונסה שוב.', 'bot');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
